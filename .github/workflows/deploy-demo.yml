name: Deploy demo to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload public_html to demo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy by FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.XSERVER_FTP_HOST }}
          username: ${{ secrets.XSERVER_FTP_USER }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public_html/
          # The Xserver sub-FTP account is restricted to this domain's public_html.
          server-dir: demo/
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
